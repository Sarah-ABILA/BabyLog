<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <title>Erreur interne – BabyLog</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #FFEFF6;
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 320px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #FF6FAF;
      margin-bottom: 10px;
    }

    .illustration {
      font-size: 5rem;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #FF6FAF;
    }

    p {
      font-size: 1rem;
      margin-bottom: 20px;
      color: #555;
    }

    .btn-home {
      display: inline-block;
      background: #FF6FAF;
      color: white;
      padding: 12px 20px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 4px 10px rgba(255, 111, 175, 0.3);
    }

    .btn-home:hover {
      background: #ff5ca3;
    }

    /* Barre de navigation style BabyLog */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .nav-item {
      text-align: center;
      font-size: 0.8rem;
      color: #888;
    }

    .nav-item.active {
      color: #FF6FAF;
      font-weight: 600;
    }

    .nav-item span {
      font-size: 1.4rem;
      display: block;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">BabyLog</div>

    <div class="illustration">💥</div>

    <h1>Oups…</h1>
    <p>Une erreur interne est survenue.<br>Nos équipes s’en occupent déjà.</p>

    <a href="/" class="btn-home">Retour à l’accueil</a>
  </div>
